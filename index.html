<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>棚卸入力 - 西町GP前店</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      color: #333;
      padding-bottom: 88px;
    }

    /* ヘッダー */
    header {
      background: #1565C0;
      color: #fff;
      padding: 12px 16px 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    header h1 { font-size: 19px; font-weight: bold; }
    .header-month { font-size: 15px; opacity: .85; }
    .progress-bar-wrap {
      background: rgba(255,255,255,.3);
      border-radius: 4px;
      height: 5px;
      margin-top: 8px;
    }
    .progress-bar {
      background: #fff;
      height: 5px;
      border-radius: 4px;
      transition: width .3s;
      width: 0%;
    }
    .progress-label {
      font-size: 13px;
      opacity: .8;
      margin-top: 4px;
      text-align: right;
    }

    /* カテゴリ見出し */
    .category-header {
      background: #E8EAF6;
      color: #283593;
      font-size: 15px;
      font-weight: bold;
      padding: 11px 16px;
      border-left: 4px solid #3F51B5;
      margin-top: 10px;
      letter-spacing: .05em;
      position: sticky;
      top: 82px;
      z-index: 50;
    }

    /* 商品カード（縦積みレイアウト） */
    .product-card {
      background: #fff;
      margin: 8px 10px;
      border-radius: 14px;
      padding: 16px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: background .2s;
    }
    .product-card.entered {
      background: #F1F8E9;
      border-left: 4px solid #66BB6A;
    }

    /* 商品名エリア */
    .product-name {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 3px;
    }
    .product-spec {
      font-size: 14px;
      color: #888;
    }
    .product-lot {
      display: inline-block;
      font-size: 13px;
      color: #1565C0;
      background: #E3F2FD;
      border-radius: 6px;
      padding: 2px 10px;
      margin-top: 5px;
      font-weight: 600;
    }
    .product-carry {
      font-size: 13px;
      color: #777;
      margin-top: 5px;
    }

    /* 入力コントロールエリア（カード内、下段） */
    .input-area {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ステッパー行 */
    .stepper-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stepper-label {
      font-size: 13px;
      color: #999;
      width: 48px;
      flex-shrink: 0;
    }
    .stepper {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .step-btn {
      width: 52px;
      height: 52px;
      font-size: 26px;
      font-weight: bold;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: #f5f5f5;
      color: #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .step-btn:active { background: #e0e0e0; }

    .stock-input {
      flex: 1;
      height: 52px;
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: #FFFDE7;
      color: #333;
      -webkit-appearance: none;
      appearance: none;
      min-width: 0;
    }
    .stock-input.filled {
      border-color: #66BB6A;
      background: #F1F8E9;
      color: #2E7D32;
    }
    .unit-label {
      font-size: 15px;
      color: #666;
      width: 32px;
      flex-shrink: 0;
    }

    /* クイック選択ボタン行 */
    .quick-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .quick-btn {
      height: 44px;
      font-size: 16px;
      font-weight: 700;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .quick-btn:active { background: #E3F2FD; }
    .quick-btn.active {
      background: #1565C0;
      border-color: #1565C0;
      color: #fff;
    }

    /* ローディング・エラー */
    #loading, #error-msg {
      text-align: center;
      padding: 60px 24px 40px;
      font-size: 15px;
      color: #888;
    }
    #error-msg { color: #c62828; }
    .loading-spin {
      width: 36px;
      height: 36px;
      border: 4px solid #ddd;
      border-top-color: #1565C0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 送信ボタン */
    .submit-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      padding: 10px 16px 14px;
      box-shadow: 0 -2px 10px rgba(0,0,0,.12);
    }
    .submit-btn {
      width: 100%;
      background: #1565C0;
      color: #fff;
      border: none;
      border-radius: 12px;
      height: 56px;
      font-size: 19px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: .05em;
    }
    .submit-btn:disabled { background: #90CAF9; }
    .submit-btn.saving   { background: #FB8C00; }
    .skip-note {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 5px;
    }

    /* 完了画面 */
    #done-screen {
      display: none;
      text-align: center;
      padding: 80px 24px;
    }
    #done-screen .done-icon { font-size: 72px; }
    #done-screen h2 { font-size: 22px; margin: 16px 0 8px; color: #2E7D32; }
    #done-screen p  { color: #666; font-size: 14px; line-height: 1.7; }
    .back-btn {
      margin-top: 28px;
      background: #E8F5E9;
      color: #2E7D32;
      border: 2px solid #66BB6A;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    /* 電卓モーダル */
    #calc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: flex-end;
    }
    #calc-overlay.open { display: flex; }
    #calc-modal {
      background: #fff;
      width: 100%;
      min-height: 52vh;
      border-radius: 24px 24px 0 0;
      padding: 14px 14px 32px;
      box-shadow: 0 -4px 24px rgba(0,0,0,.2);
    }
    #calc-handle {
      width: 40px; height: 4px;
      background: #ddd; border-radius: 2px;
      margin: 0 auto 12px;
    }
    #calc-title {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 8px;
      font-weight: 600;
    }
    #calc-display {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 12px;
      text-align: right;
    }
    #calc-expr  { font-size: 14px; color: #aaa; min-height: 20px; word-break: break-all; }
    #calc-value { font-size: 40px; font-weight: bold; color: #111; line-height: 1.2; }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }
    .calc-btn {
      height: 62px;
      border: none;
      border-radius: 14px;
      font-size: 24px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .calc-btn:active { filter: brightness(.88); }
    .calc-btn.num    { background: #f0f0f0; color: #222; }
    .calc-btn.op     { background: #E8EAF6; color: #283593; }
    .calc-btn.eq     { background: #1565C0; color: #fff; grid-row: span 2; height: auto; }
    .calc-btn.ac     { background: #FFEBEE; color: #C62828; }
    .calc-btn.del    { background: #FFF3E0; color: #E65100; }
    .calc-btn.set    { background: #E8F5E9; color: #2E7D32; font-size: 17px; }
    .calc-btn.cancel { background: #f0f0f0; color: #666; font-size: 16px; }

    /* トースト */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: #fff;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 300;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>棚卸入力　西町GP前店</h1>
    <span class="header-month" id="header-month">読込中...</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-label" id="progress-label">0 / 0 件入力済み</div>
</header>

<div id="loading">
  <div class="loading-spin"></div>
  データを読み込んでいます...
</div>
<div id="error-msg" style="display:none"></div>
<div id="product-list"></div>
<div id="done-screen">
  <div class="done-icon">✅</div>
  <h2>送信完了！</h2>
  <p id="done-message"></p>
  <button class="back-btn" onclick="location.reload()">続けて入力する</button>
</div>

<div class="submit-area" id="submit-area" style="display:none">
  <button class="submit-btn" id="submit-btn" onclick="submitInventory()">一括送信</button>
  <div class="skip-note">※未入力の商品は送信されません</div>
</div>

<div id="toast"></div>

<!-- 電卓モーダル -->
<div id="calc-overlay" onclick="calcOverlayClick(event)">
  <div id="calc-modal">
    <div id="calc-handle"></div>
    <div id="calc-title">現在庫を入力</div>
    <div id="calc-display">
      <div id="calc-expr"></div>
      <div id="calc-value">0</div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn ac"  onclick="calcAC()">AC</button>
      <button class="calc-btn del" onclick="calcDel()">⌫</button>
      <button class="calc-btn op"  onclick="calcOp('%')">％</button>
      <button class="calc-btn op"  onclick="calcOp('÷')">÷</button>

      <button class="calc-btn num" onclick="calcNum('7')">7</button>
      <button class="calc-btn num" onclick="calcNum('8')">8</button>
      <button class="calc-btn num" onclick="calcNum('9')">9</button>
      <button class="calc-btn op"  onclick="calcOp('×')">×</button>

      <button class="calc-btn num" onclick="calcNum('4')">4</button>
      <button class="calc-btn num" onclick="calcNum('5')">5</button>
      <button class="calc-btn num" onclick="calcNum('6')">6</button>
      <button class="calc-btn op"  onclick="calcOp('−')">−</button>

      <button class="calc-btn num" onclick="calcNum('1')">1</button>
      <button class="calc-btn num" onclick="calcNum('2')">2</button>
      <button class="calc-btn num" onclick="calcNum('3')">3</button>
      <button class="calc-btn op"  onclick="calcOp('+')">＋</button>

      <button class="calc-btn num" style="grid-column:span 2" onclick="calcNum('0')">0</button>
      <button class="calc-btn num" onclick="calcNum('.')">．</button>
      <button class="calc-btn eq"  onclick="calcEq()">=</button>

      <button class="calc-btn cancel" onclick="closeCalc()">キャンセル</button>
      <button class="calc-btn set" style="grid-column:span 3" onclick="calcSet()">この値をセット ✔</button>
    </div>
  </div>
</div>

<script>
  const TEMPLATE_SCRIPT_URL = '<?= scriptUrl ?>';
  const FIXED_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6641CimYDtnyqor0ykjd6bqxPLzyn707cQpAogZ_xVHVNos39jHdcAuPa4RQyXpIx/exec';
  const SCRIPT_URL = (
    FIXED_SCRIPT_URL ||
    (TEMPLATE_SCRIPT_URL.includes('<?=') ? '' : TEMPLATE_SCRIPT_URL)
  ).trim();

  let allProducts = [];

  window.onload = function () {
    if (!SCRIPT_URL) {
      showError(new Error('API URLが未設定です'));
      return;
    }
    jsonpRequest('getData').then(renderInventory).catch(showError);
  };

  function showError(err) {
    document.getElementById('loading').style.display   = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent   = err.message || String(err);
  }

  function renderInventory(data) {
    document.getElementById('loading').style.display = 'none';
    if (data.error) { showError(new Error(data.error)); return; }

    document.getElementById('header-month').textContent = data.month + ' 棚卸';
    document.getElementById('submit-area').style.display = 'block';

    const list = document.getElementById('product-list');
    allProducts = [];

    data.categories.forEach(cat => {
      const header = document.createElement('div');
      header.className   = 'category-header';
      header.textContent = cat.name;
      list.appendChild(header);

      cat.products.forEach(p => {
        allProducts.push(p.name);
        const stockVal = p.stock !== null ? p.stock : '';
        const card = document.createElement('div');
        card.className    = 'product-card' + (p.stock !== null ? ' entered' : '');
        card.dataset.name = p.name;

        const carryText = `繰越 ${p.carry}${p.unit}　仕入 ${p.purchase}${p.unit}`;
        const qv = v => stockVal !== '' && Math.round(parseFloat(stockVal)*100)/100 === v ? 'active' : '';

        card.innerHTML = `
          <div class="product-name">${escHtml(p.name)}</div>
          ${p.spec ? `<div class="product-spec">${escHtml(p.spec)}</div>` : ''}
          ${p.lot  ? `<span class="product-lot">1LOT = ${escHtml(p.lot)}</span>` : ''}
          <div class="product-carry">${escHtml(carryText)}</div>
          <div class="input-area">
            <div class="stepper-row">
              <div class="stepper-label">現在庫</div>
              <div class="stepper">
                <button class="step-btn" onclick="stepValue(this,-0.25)" type="button">－</button>
                <input
                  class="stock-input${stockVal !== '' ? ' filled' : ''}"
                  type="number"
                  inputmode="decimal"
                  min="0"
                  step="0.25"
                  placeholder="－"
                  value="${stockVal}"
                  data-name="${escHtml(p.name)}"
                  onchange="onInputChange(this)"
                  oninput="onInputChange(this)"
                  onfocus="openCalc(this)"
                  readonly
                >
                <button class="step-btn" onclick="stepValue(this,0.25)" type="button">＋</button>
              </div>
              <div class="unit-label">${escHtml(p.unit)}</div>
            </div>
            <div class="quick-row">
              <button class="quick-btn ${qv(0.25)}" onclick="setQuick(this,0.25)" type="button">¼</button>
              <button class="quick-btn ${qv(0.5)}"  onclick="setQuick(this,0.5)"  type="button">½</button>
              <button class="quick-btn ${qv(0.75)}" onclick="setQuick(this,0.75)" type="button">¾</button>
              <button class="quick-btn ${qv(1)}"    onclick="setQuick(this,1)"    type="button">1</button>
              <button class="quick-btn ${qv(2)}"    onclick="setQuick(this,2)"    type="button">2</button>
              <button class="quick-btn ${qv(3)}"    onclick="setQuick(this,3)"    type="button">3</button>
            </div>
          </div>
        `;
        list.appendChild(card);
      });
    });

    updateProgress();
  }

  function stepValue(btn, delta) {
    const input = btn.closest('.stepper').querySelector('.stock-input');
    const cur   = input.value === '' ? 0 : parseFloat(input.value);
    input.value = Math.max(0, Math.round((cur + delta) * 100) / 100);
    onInputChange(input);
    syncQuickBtns(input);
  }

  function setQuick(btn, val) {
    const input = btn.closest('.input-area').querySelector('.stock-input');
    input.value = parseFloat(input.value) === val ? '' : val;
    onInputChange(input);
    syncQuickBtns(input);
  }

  const QUICK_MAP = { '¼': 0.25, '½': 0.5, '¾': 0.75, '1': 1, '2': 2, '3': 3 };
  function syncQuickBtns(input) {
    const cur  = input.value === '' ? null : Math.round(parseFloat(input.value) * 100) / 100;
    input.closest('.input-area').querySelectorAll('.quick-btn')
      .forEach(b => b.classList.toggle('active', QUICK_MAP[b.textContent] === cur));
  }

  function onInputChange(input) {
    const filled = input.value.trim() !== '';
    input.classList.toggle('filled', filled);
    input.closest('.product-card').classList.toggle('entered', filled);
    syncQuickBtns(input);
    updateProgress();
  }

  function updateProgress() {
    const inputs = document.querySelectorAll('.stock-input');
    const n      = Array.from(inputs).filter(i => i.value.trim() !== '').length;
    const pct    = inputs.length === 0 ? 0 : Math.round(n / inputs.length * 100);
    document.getElementById('progress-bar').style.width   = pct + '%';
    document.getElementById('progress-label').textContent = `${n} / ${inputs.length} 件入力済み`;
  }

  function submitInventory() {
    const entries = Array.from(document.querySelectorAll('.stock-input'))
      .filter(i => i.value.trim() !== '')
      .map(i => ({ name: i.dataset.name, stock: parseFloat(i.value) }));

    if (!entries.length) { showToast('入力された商品がありません'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '送信中...'; btn.classList.add('saving');

    jsonpRequest('save', { entries: JSON.stringify(entries) })
      .then(r => {
        btn.disabled = false; btn.textContent = '一括送信'; btn.classList.remove('saving');
        if (r.success) {
          document.getElementById('product-list').style.display = 'none';
          document.getElementById('submit-area').style.display  = 'none';
          document.getElementById('done-screen').style.display  = 'block';
          document.getElementById('done-message').textContent   = r.message + '\nスプレッドシートに自動反映されました。';
        } else {
          showToast('エラー: ' + r.message);
        }
      })
      .catch(err => {
        btn.disabled = false; btn.textContent = '一括送信'; btn.classList.remove('saving');
        showToast('送信エラー: ' + (err.message || String(err)));
      });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ============================================================
  // 電卓
  // ============================================================
  let calcTarget = null, calcExpr = '', calcResult = '0', calcJustEq = false;

  function openCalc(input) {
    calcTarget = input; calcExpr = ''; calcJustEq = false;
    calcResult = input.value !== '' ? input.value : '0';
    _calcRefresh();
    document.getElementById('calc-title').textContent =
      (input.dataset.name || '') + '　現在庫を入力';
    document.getElementById('calc-overlay').classList.add('open');
  }
  function closeCalc() {
    document.getElementById('calc-overlay').classList.remove('open');
    calcTarget = null;
  }
  function calcOverlayClick(e) {
    if (e.target === document.getElementById('calc-overlay')) closeCalc();
  }
  function calcNum(ch) {
    if (calcJustEq) { calcExpr = ''; calcJustEq = false; }
    if (ch === '.') {
      const tok = calcExpr.split(/[+\-×÷%]/);
      if (tok[tok.length - 1].includes('.')) return;
    }
    calcExpr  += ch;
    calcResult = _safeEval(calcExpr);
    _calcRefresh();
  }
  function calcOp(op) {
    calcJustEq = false;
    if (/[+\-×÷%]$/.test(calcExpr)) calcExpr = calcExpr.slice(0, -1);
    if (calcExpr === '') calcExpr = calcResult;
    calcExpr  += op;
    _calcRefresh();
  }
  function calcEq() {
    if (!calcExpr) return;
    calcResult = _safeEval(calcExpr);
    calcExpr   = calcResult;
    calcJustEq = true;
    _calcRefresh();
  }
  function calcAC()  { calcExpr = ''; calcResult = '0'; calcJustEq = false; _calcRefresh(); }
  function calcDel() {
    calcJustEq = false;
    calcExpr   = calcExpr.slice(0, -1);
    calcResult = calcExpr === '' ? '0' : _safeEval(calcExpr);
    _calcRefresh();
  }
  function calcSet() {
    if (!calcTarget) { closeCalc(); return; }
    const val = parseFloat(calcResult);
    if (!isNaN(val) && val >= 0) {
      calcTarget.value = Math.round(val * 10000) / 10000;
      onInputChange(calcTarget);
    }
    closeCalc();
  }
  function _safeEval(expr) {
    try {
      const js = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/％/g,'/100');
      const r  = Function('"use strict"; return (' + js + ')')();
      return isFinite(r) ? String(Math.round(r * 10000) / 10000) : 'エラー';
    } catch { return calcResult; }
  }
  function _calcRefresh() {
    document.getElementById('calc-expr').textContent  = calcExpr || ' ';
    document.getElementById('calc-value').textContent = calcResult;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function jsonpRequest(action, params = {}) {
    return new Promise((resolve, reject) => {
      const cb  = '__cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const qs  = new URLSearchParams({ action, callback: cb, ...params });
      const src = SCRIPT_URL + (SCRIPT_URL.includes('?') ? '&' : '?') + qs.toString();
      const el  = document.createElement('script');
      const cleanup = () => { delete window[cb]; el.remove(); };
      window[cb] = data => { cleanup(); resolve(data); };
      el.onerror  = () => { cleanup(); reject(new Error('API呼び出しに失敗しました')); };
      el.src = src;
      document.body.appendChild(el);
    });
  }
</script>
</body>
